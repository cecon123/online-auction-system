name: Build, Test, and Release

on:
  push:
    branches: ["main", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to package and publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install headless JavaFX test dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build and test all modules
        run: xvfb-run -a mvn -B clean verify

      - name: Upload CI JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auctionpro-ci-jars
          path: |
            server/target/auction-server.jar
            client/target/auction-client.jar
          if-no-files-found: error

  package-release:
    name: Package release artifacts (${{ matrix.platform }})
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Package without rerunning tests
        run: mvn -B clean package -DskipTests

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p dist
          version="${release_tag#v}"
          cp client/target/auction-client.jar "dist/auction-client-${matrix_platform}-${version}.jar"
          if [ "$matrix_platform" = "linux" ]; then
            cp server/target/auction-server.jar "dist/auction-server-${version}.jar"
          fi
        env:
          release_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          matrix_platform: ${{ matrix.platform }}

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: package-release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -maxdepth 1 -type f -print

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --title "AuctionPro ${version}" \
              --notes "Automated release for AuctionPro ${version}. Includes server fat JAR and platform-specific client fat JARs."
          fi
